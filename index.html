<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2026 歐洲旅遊行程表</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons for beautiful SVG icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* 自訂捲軸隱藏，保持介面乾淨 */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f3f4f6;
            -webkit-tap-highlight-color: transparent;
        }

        .timeline-line::before {
            content: '';
            position: absolute;
            top: 0;
            bottom: -2rem;
            left: 1.25rem;
            width: 2px;
            background-color: #e5e7eb;
            z-index: 0;
        }

        .timeline-item:last-child .timeline-line::before {
            bottom: 0;
        }

        /* Modal 動畫過渡效果 */
        #info-modal.show {
            opacity: 1;
            pointer-events: auto;
        }

        #info-modal.show .modal-card {
            transform: scale(1);
        }

        /* 設定面板動畫 */
        #settings-panel {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease, padding 0.3s ease, opacity 0.3s ease;
            opacity: 0;
        }

        #settings-panel.open {
            max-height: 200px;
            opacity: 1;
        }
    </style>
</head>

<body class="text-gray-800 antialiased flex flex-col overflow-hidden" style="height: 100vh; height: 100dvh;">

    <!-- Header & Navigation -->
    <header class="bg-white shadow-sm z-20 flex-shrink-0 sticky top-0">
        <div
            class="px-4 pt-6 pb-3 bg-gradient-to-r from-blue-600 to-indigo-700 text-white rounded-b-3xl shadow-lg flex justify-between items-start">
            <div>
                <h1 class="text-xl font-bold tracking-wider">✈️ 2026 歐洲24天大縱走</h1>
                <p class="text-blue-100 text-sm mt-1 opacity-90"><i data-lucide="calendar"
                        class="inline w-3 h-3 mb-0.5"></i> 02/27 - 03/22</p>
            </div>
            <div class="flex items-center gap-2">
                <!-- 同步按鈕 (手動從雲端抓取) -->
                <button id="sync-btn" onclick="forceSync()"
                    class="bg-white/20 hover:bg-white/30 p-2 rounded-full transition-all flex items-center justify-center shadow-sm active:scale-95"
                    title="從 Google 試算表同步最新資料">
                    <i data-lucide="refresh-cw" class="w-5 h-5 text-white"></i>
                </button>
                <!-- 設定按鈕 -->
                <button id="settings-btn" onclick="toggleSettings()"
                    class="bg-white/20 hover:bg-white/30 p-2 rounded-full transition-all flex items-center justify-center shadow-sm active:scale-95"
                    title="設定資料來源">
                    <i data-lucide="settings" class="w-5 h-5 text-white"></i>
                </button>
            </div>
        </div>

        <!-- 設定面板 -->
        <div id="settings-panel" class="bg-gradient-to-r from-blue-50 to-indigo-50 px-4">
            <div class="py-3 max-w-lg mx-auto">
                <div class="flex items-center gap-2 mb-2">
                    <span id="source-badge" class="text-xs font-bold px-2 py-0.5 rounded-full"></span>
                </div>
                <div class="flex gap-2">
                    <input id="sheet-url-input" type="text" placeholder="貼上 Google Sheet CSV 連結"
                        class="flex-1 text-sm px-3 py-2 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-transparent bg-white">
                    <button onclick="applySheetUrl()"
                        class="px-3 py-2 bg-blue-600 text-white text-sm font-bold rounded-lg hover:bg-blue-700 transition-colors active:scale-95 flex-shrink-0">
                        套用
                    </button>
                    <button onclick="clearSheetUrl()"
                        class="px-3 py-2 bg-gray-200 text-gray-600 text-sm font-bold rounded-lg hover:bg-gray-300 transition-colors active:scale-95 flex-shrink-0">
                        清除
                    </button>
                </div>
                <!-- 分享連結列 -->
                <div id="share-row" class="mt-2 hidden">
                    <button onclick="generateShareUrl()"
                        class="w-full flex items-center justify-center gap-1.5 px-3 py-2 bg-indigo-600 text-white text-sm font-bold rounded-lg hover:bg-indigo-700 transition-colors active:scale-95">
                        <i data-lucide="share-2" class="w-4 h-4"></i> 產生分享連結
                    </button>
                </div>
            </div>
        </div>

        <!-- Day Tabs (Horizontal Scrollable) -->
        <div class="px-2 py-3 border-b border-gray-100 relative">
            <nav id="day-tabs"
                class="flex space-x-2 overflow-x-auto overflow-y-hidden no-scrollbar px-2 snap-x scroll-smooth">
                <!-- Tabs will be injected here via JS -->
            </nav>
        </div>
    </header>

    <!-- Main Content Area -->
    <main class="flex-1 overflow-y-auto no-scrollbar relative z-10 bg-gray-50 pb-20">
        <div id="content-area" class="px-4 py-6 max-w-lg mx-auto">
            <!-- Loading 狀態顯示 -->
            <div id="loading-indicator" class="flex flex-col items-center justify-center py-20 text-gray-400">
                <i data-lucide="loader-2" class="w-8 h-8 animate-spin mb-4 text-blue-500"></i>
                <p class="font-bold tracking-widest text-sm">載入行程中...</p>
            </div>
            <!-- Content injected via JS -->
        </div>
    </main>

    <!-- Modal (隱藏的彈窗) -->
    <div id="info-modal"
        class="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm opacity-0 pointer-events-none transition-opacity duration-300"
        onclick="closeModal(event)">
        <div class="modal-card bg-white rounded-2xl w-11/12 max-w-md p-6 transform scale-95 transition-transform duration-300 shadow-2xl relative max-h-[85vh] flex flex-col"
            onclick="event.stopPropagation()">
            <button onclick="closeModal()"
                class="absolute top-4 right-4 text-gray-400 hover:text-gray-800 hover:bg-gray-100 rounded-full p-1.5 transition-colors z-10">
                <i data-lucide="x" class="w-5 h-5"></i>
            </button>

            <!-- 彈窗頂部區塊 (固定不捲動) -->
            <div class="flex-shrink-0 pr-8 border-b border-gray-100 pb-4 mb-4">
                <h3 id="modal-title" class="text-xl font-black text-gray-800 leading-snug mb-2.5"></h3>
                <div id="modal-transport-container" class="hidden">
                    <span id="modal-transport"
                        class="text-xs font-bold text-blue-700 bg-blue-50 border border-blue-100 px-2.5 py-1 rounded-md inline-flex items-center"></span>
                </div>
            </div>

            <!-- 彈窗內容區塊 (可獨立捲動) -->
            <div id="modal-content" class="flex-1 overflow-y-auto no-scrollbar text-[15px] pr-1 pb-2">
                <!-- Content injected via JS -->
            </div>
        </div>
    </div>

    <!-- Application Logic & Data -->
    <script>
        const DATA_URL = 'plan.json'; // 行程資料 JSON 檔案路徑
        const CACHE_KEY = 'europe_itinerary_2026_v2_cache'; // LocalStorage 快取金鑰
        const SHEET_URL_KEY = 'europe_itinerary_sheet_url'; // 記憶上次成功的 Sheet URL
        const ENCRYPT_KEY = 'EuropeTrip2026!@#Journey'; // 加密金鑰

        let itineraryData = [];
        let currentActiveDayId = 0;

        // 初始化 Lucide icon
        lucide.createIcons();

        // --- 加密/解密函式 (XOR + Base64 URL-safe) ---
        function encryptUrl(plainText) {
            const key = ENCRYPT_KEY;
            let encrypted = '';
            for (let i = 0; i < plainText.length; i++) {
                encrypted += String.fromCharCode(plainText.charCodeAt(i) ^ key.charCodeAt(i % key.length));
            }
            // Base64 編碼後轉為 URL-safe 格式
            return btoa(unescape(encodeURIComponent(encrypted)))
                .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
        }

        function decryptUrl(encoded) {
            // 還原 URL-safe Base64
            let base64 = encoded.replace(/-/g, '+').replace(/_/g, '/');
            while (base64.length % 4) base64 += '=';
            const encrypted = decodeURIComponent(escape(atob(base64)));
            const key = ENCRYPT_KEY;
            let decrypted = '';
            for (let i = 0; i < encrypted.length; i++) {
                decrypted += String.fromCharCode(encrypted.charCodeAt(i) ^ key.charCodeAt(i % key.length));
            }
            return decrypted;
        }

        // --- 應用程式初始化邏輯 (離線優先 + 背景更新) ---
        function loadApp() {
            const cachedData = localStorage.getItem(CACHE_KEY);

            if (cachedData) {
                try {
                    itineraryData = JSON.parse(cachedData);
                    const loadingEl = document.getElementById('loading-indicator');
                    if (loadingEl) loadingEl.style.display = 'none';
                    initApp();
                } catch (e) { }
            }

            // 偵測 URL 中的 ?s= 加密分享參數
            const urlParams = new URLSearchParams(window.location.search);
            const encryptedParam = urlParams.get('s');
            if (encryptedParam) {
                try {
                    const sheetUrl = decryptUrl(encryptedParam);
                    if (sheetUrl && sheetUrl.startsWith('http')) {
                        localStorage.setItem(SHEET_URL_KEY, sheetUrl);
                        updateSourceBadge();
                        fetchSheetData(sheetUrl, false);
                        // 清除 URL 中的 ?s= 參數，保持網址乾淨
                        window.history.replaceState({}, '', window.location.pathname);
                        return;
                    }
                } catch (e) {
                    console.error('解密分享連結失敗:', e);
                }
            }

            updateSourceBadge();

            // 無論是否有快取，都在背景靜默抓取最新資料
            const savedSheetUrl = localStorage.getItem(SHEET_URL_KEY);
            if (savedSheetUrl) {
                fetchSheetData(savedSheetUrl, false);
            } else {
                fetchData(false);
            }
        }

        // --- 手動強制同步 (點擊右上角按鈕觸發) ---
        function forceSync() {
            const syncIcon = document.querySelector('#sync-btn svg');
            if (syncIcon) syncIcon.classList.add('animate-spin');

            const savedSheetUrl = localStorage.getItem(SHEET_URL_KEY);
            if (savedSheetUrl) {
                showToast('⏳ 正在從 Google Sheet 同步...');
                fetchSheetData(savedSheetUrl, true);
            } else {
                showToast('⏳ 正在從 plan.json 同步...');
                fetchData(true);
            }
        }

        // --- 從 plan.json 讀取行程資料 ---
        async function fetchData(isManual = false) {
            try {
                const url = `${DATA_URL}?t=${new Date().getTime()}`;
                const response = await fetch(url);

                if (!response.ok) throw new Error(`HTTP ${response.status}`);

                const parsedData = await response.json();

                if (parsedData.length > 0) {
                    itineraryData = parsedData;
                    localStorage.setItem(CACHE_KEY, JSON.stringify(itineraryData));
                    const loadingEl = document.getElementById('loading-indicator');
                    if (loadingEl) loadingEl.style.display = 'none';
                    initApp();
                    if (isManual) showToast('✅ 行程資料同步成功！');
                } else {
                    if (isManual) showToast('⚠️ 抓取成功但資料為空', true);
                }
            } catch (err) {
                console.error('載入行程資料失敗:', err);
                if (isManual) {
                    showToast('❌ 同步失敗：無法載入行程資料', true);
                } else if (itineraryData.length === 0) {
                    showError("載入失敗", "無法載入行程資料，請確認網路狀態後重試。");
                }
            } finally {
                stopSyncIcon();
            }
        }

        // --- 從 Google Sheet CSV 讀取行程資料 ---
        async function fetchSheetData(sheetUrl, isManual = false) {
            try {
                const url = `${sheetUrl}${sheetUrl.includes('?') ? '&' : '?'}t=${new Date().getTime()}`;
                const response = await fetch(url);

                if (!response.ok) throw new Error(`HTTP ${response.status}`);

                const csvText = await response.text();
                const parsedData = csvToItinerary(csvText);

                if (parsedData.length > 0) {
                    itineraryData = parsedData;
                    localStorage.setItem(CACHE_KEY, JSON.stringify(itineraryData));
                    localStorage.setItem(SHEET_URL_KEY, sheetUrl);
                    const loadingEl = document.getElementById('loading-indicator');
                    if (loadingEl) loadingEl.style.display = 'none';
                    initApp();
                    updateSourceBadge();
                    if (isManual) showToast('✅ Google Sheet 同步成功！');
                } else {
                    if (isManual) showToast('⚠️ 抓取成功但資料為空', true);
                }
            } catch (err) {
                console.error('載入 Google Sheet 失敗:', err);
                if (isManual) {
                    showToast('❌ 同步失敗：無法載入 Google Sheet', true);
                } else if (itineraryData.length === 0) {
                    showError("載入失敗", "無法載入 Google Sheet 資料，請確認連結或網路狀態。");
                }
            } finally {
                stopSyncIcon();
            }
        }

        // --- CSV 解析：將 CSV 文字轉為二維陣列 ---
        function parseCSV(csvText) {
            const rows = [];
            let current = '';
            let inQuotes = false;
            let row = [];

            for (let i = 0; i < csvText.length; i++) {
                const ch = csvText[i];
                const next = csvText[i + 1];

                if (inQuotes) {
                    if (ch === '"' && next === '"') {
                        current += '"';
                        i++;
                    } else if (ch === '"') {
                        inQuotes = false;
                    } else {
                        current += ch;
                    }
                } else {
                    if (ch === '"') {
                        inQuotes = true;
                    } else if (ch === ',') {
                        row.push(current.trim());
                        current = '';
                    } else if (ch === '\n' || (ch === '\r' && next === '\n')) {
                        row.push(current.trim());
                        current = '';
                        if (row.length > 1 || row[0] !== '') rows.push(row);
                        row = [];
                        if (ch === '\r') i++;
                    } else {
                        current += ch;
                    }
                }
            }
            // 最後一行
            row.push(current.trim());
            if (row.length > 1 || row[0] !== '') rows.push(row);

            return rows;
        }

        // --- CSV 轉換為行程 JSON ---
        function csvToItinerary(csvText) {
            const rows = parseCSV(csvText);
            if (rows.length < 2) return [];

            const headers = rows[0];
            const colIdx = {};
            headers.forEach((h, i) => colIdx[h] = i);

            const get = (row, colName) => {
                const idx = colIdx[colName];
                return (idx !== undefined && idx < row.length) ? row[idx] : '';
            };

            // 組合時間欄位 t
            const buildTime = (row) => {
                const depart = get(row, '出發時間');
                const arrive = get(row, '抵達時間');
                const startJourney = get(row, '啟程時間');

                if (depart && arrive) return `${depart}-${arrive}`;
                if (arrive && startJourney) return `${arrive}-${startJourney}`;
                if (arrive) return `${arrive} 抵達`;
                if (startJourney) return `${startJourney} 出發`;
                return '-';
            };

            // 組合日期顯示 (e.g. "2/26 (週四)")
            const buildDateDisplay = (dateStr, weekday) => {
                if (!dateStr) return '';
                const parts = dateStr.split('/');
                if (parts.length >= 3) {
                    const m = parseInt(parts[1], 10);
                    const d = parseInt(parts[2], 10);
                    return weekday ? `${m}/${d} (${weekday})` : `${m}/${d}`;
                }
                return dateStr;
            };

            // 轉換 dateStr 為 ISO 格式 (e.g. "2026/02/26" → "2026-02-26")
            const toISODate = (dateStr) => {
                if (!dateStr) return '';
                return dateStr.replace(/\//g, '-');
            };

            // 依 Day 分群
            const dayMap = new Map();

            for (let i = 1; i < rows.length; i++) {
                const row = rows[i];
                const dayNum = get(row, 'Day');
                if (dayNum === '') continue;

                const dayKey = parseInt(dayNum, 10);
                if (isNaN(dayKey)) continue;

                if (!dayMap.has(dayKey)) {
                    const country = get(row, '國家');
                    const city = get(row, '城市');
                    const dateRaw = get(row, 'Date');
                    const weekday = get(row, '星期');

                    dayMap.set(dayKey, {
                        id: dayKey,
                        day: `Day ${dayKey}`,
                        date: buildDateDisplay(dateRaw, weekday),
                        dateStr: toISODate(dateRaw),
                        location: (country && city) ? `${country} ${city}` : (country || city || ''),
                        events: []
                    });
                }

                const dayObj = dayMap.get(dayKey);

                // 更新 location 如果目前的 row 有更新的國家/城市
                const rowCountry = get(row, '國家');
                const rowCity = get(row, '城市');
                if (rowCountry && rowCity) {
                    const newLoc = `${rowCountry} ${rowCity}`;
                    if (!dayObj.location.includes(newLoc.split(' ').pop())) {
                        // 保留最後出現的 location
                    }
                }

                // 更新 date/dateStr 如果之前為空
                const dateRaw = get(row, 'Date');
                const weekday = get(row, '星期');
                if (dateRaw && !dayObj.dateStr) {
                    dayObj.date = buildDateDisplay(dateRaw, weekday);
                    dayObj.dateStr = toISODate(dateRaw);
                }

                const event = {
                    t: buildTime(row),
                    tr: get(row, '交通方式') || '-',
                    ti: get(row, '行程')
                };

                // 跳過沒有行程名稱的空列
                if (!event.ti) continue;

                const cost = get(row, '費用');
                if (cost) event.c = cost;

                const hours = get(row, '開放時間');
                if (hours) event.o = hours;

                const note = get(row, '備註');
                if (note) event.n = note;

                const intro = get(row, '景點介紹');
                if (intro) event.intro = intro;

                const navUrl = get(row, 'navigation');
                if (navUrl) event.navigation = navUrl;

                dayObj.events.push(event);
            }

            // 排序並回傳
            return Array.from(dayMap.values()).sort((a, b) => a.id - b.id);
        }

        // --- 設定面板相關 ---
        function toggleSettings() {
            const panel = document.getElementById('settings-panel');
            panel.classList.toggle('open');
            if (panel.classList.contains('open')) {
                const savedUrl = localStorage.getItem(SHEET_URL_KEY);
                if (savedUrl) {
                    document.getElementById('sheet-url-input').value = savedUrl;
                }
                updateShareRowVisibility();
                lucide.createIcons();
            }
        }

        function updateShareRowVisibility() {
            const shareRow = document.getElementById('share-row');
            const savedUrl = localStorage.getItem(SHEET_URL_KEY);
            if (savedUrl) {
                shareRow.classList.remove('hidden');
            } else {
                shareRow.classList.add('hidden');
            }
        }

        function generateShareUrl() {
            const sheetUrl = localStorage.getItem(SHEET_URL_KEY);
            if (!sheetUrl) {
                showToast('⚠️ 尚未設定 Google Sheet 連結', true);
                return;
            }
            const encrypted = encryptUrl(sheetUrl);
            const shareUrl = `${window.location.origin}${window.location.pathname}?s=${encrypted}`;

            navigator.clipboard.writeText(shareUrl).then(() => {
                showToast('📋 分享連結已複製到剪貼簿！');
            }).catch(() => {
                // Fallback: 用臨時 input 複製
                const tmp = document.createElement('input');
                tmp.value = shareUrl;
                document.body.appendChild(tmp);
                tmp.select();
                document.execCommand('copy');
                tmp.remove();
                showToast('📋 分享連結已複製到剪貼簿！');
            });
        }

        function applySheetUrl() {
            const input = document.getElementById('sheet-url-input');
            const url = input.value.trim();
            if (!url) {
                showToast('⚠️ 請貼上 Google Sheet CSV 連結', true);
                return;
            }
            showToast('⏳ 正在載入 Google Sheet...');
            fetchSheetData(url, true);
            toggleSettings();
        }

        function clearSheetUrl() {
            localStorage.removeItem(SHEET_URL_KEY);
            document.getElementById('sheet-url-input').value = '';
            updateSourceBadge();
            showToast('✅ 已清除，將使用本地 plan.json');
            toggleSettings();
            fetchData(false);
        }

        function updateSourceBadge() {
            const badge = document.getElementById('source-badge');
            const savedUrl = localStorage.getItem(SHEET_URL_KEY);
            if (savedUrl) {
                badge.textContent = '📊 資料來源：Google Sheet';
                badge.className = 'text-xs font-bold px-2 py-0.5 rounded-full bg-green-100 text-green-700 border border-green-200';
            } else {
                badge.textContent = '📁 資料來源：本地 plan.json';
                badge.className = 'text-xs font-bold px-2 py-0.5 rounded-full bg-gray-100 text-gray-600 border border-gray-200';
            }
        }

        function stopSyncIcon() {
            const syncIcon = document.querySelector('#sync-btn svg');
            if (syncIcon) syncIcon.classList.remove('animate-spin');
        }

        // --- 輕量級提示框 (Toast UI) ---
        function showToast(message, isError = false) {
            const toast = document.createElement('div');
            toast.className = `fixed bottom-24 left-1/2 transform -translate-x-1/2 px-5 py-2.5 rounded-full text-[14px] font-bold shadow-xl z-50 transition-all duration-300 opacity-0 flex items-center gap-2 ${isError ? 'bg-red-600 text-white' : 'bg-gray-800 text-white'}`;
            toast.innerText = message;
            document.body.appendChild(toast);

            // 觸發淡入動畫
            requestAnimationFrame(() => {
                toast.classList.remove('opacity-0');
                toast.classList.add('opacity-100', '-translate-y-2');
            });

            // 2.5 秒後淡出並移除
            setTimeout(() => {
                toast.classList.remove('opacity-100', '-translate-y-2');
                toast.classList.add('opacity-0');
                setTimeout(() => toast.remove(), 300);
            }, 2500);
        }

        function showError(title, msg) {
            const contentArea = document.getElementById('content-area');
            contentArea.innerHTML = `
                <div class="text-center text-red-500 py-10">
                    <i data-lucide="wifi-off" class="w-12 h-12 mx-auto mb-4 text-red-400"></i>
                    <p class="font-bold text-xl mb-2">${title}</p>
                    <p class="text-[15px] text-gray-500 max-w-xs mx-auto">${msg}</p>
                </div>
            `;
            lucide.createIcons();
        }

        // --- 輔助函式 ---
        function getTransportIcon(type) {
            if (!type) return 'clock';
            if (type.includes('飛機')) return 'plane';
            if (type.includes('自駕') || type.includes('叫車')) return 'car';
            if (type.includes('巴士') || type.includes('公車')) return 'bus';
            if (type.includes('火車') || type.includes('電車') || type.includes('歐洲之星') || type.includes('國鐵') || type.includes('地鐵')) return 'train-front';
            if (type.includes('渡輪') || type.includes('遊船')) return 'ship';
            if (type.includes('步行')) return 'footprints';
            if (type.includes('纜車')) return 'tram-front';
            return 'clock';
        }

        // --- 彈窗處理 (Modal) ---
        function openModal(dayId, eventIndex) {
            const dayInfo = itineraryData.find(d => d.id === dayId);
            const event = dayInfo.events[eventIndex];

            document.getElementById('modal-title').innerText = event.ti;

            const transStr = event.tr;
            const transportContainer = document.getElementById('modal-transport-container');
            const transportEl = document.getElementById('modal-transport');

            if (transStr && transStr !== '-') {
                transportEl.innerHTML = `<i data-lucide="${getTransportIcon(transStr)}" class="w-3.5 h-3.5 mr-1.5"></i>交通：${transStr}`;
                transportContainer.classList.remove('hidden');
            } else {
                transportContainer.classList.add('hidden');
            }

            let contentHtml = '';

            if (event.n) {
                contentHtml += `
                    <div class="mb-5 bg-gray-50 p-3.5 rounded-xl border border-gray-200/60 shadow-sm">
                        <p class="text-gray-700 text-[14px] font-medium leading-relaxed whitespace-pre-line flex items-start">
                            <i data-lucide="info" class="w-4 h-4 mr-2 text-gray-400 flex-shrink-0 mt-0.5"></i>
                            <span>${event.n}</span>
                        </p>
                    </div>
                `;
            }

            if (event.intro) {
                contentHtml += `
                    <div class="mb-5">
                        <h4 class="flex items-center text-[15px] font-black text-emerald-700 mb-2">
                            <i data-lucide="leaf" class="w-4 h-4 mr-1.5"></i> 景點簡介
                        </h4>
                        <div class="bg-gradient-to-br from-emerald-50/80 to-emerald-50/30 p-4 rounded-2xl border border-emerald-100/70">
                            <p class="text-gray-700 text-[14px] leading-relaxed whitespace-pre-line">${event.intro}</p>
                        </div>
                    </div>
                `;
            }

            if (event.story) {
                contentHtml += `
                    <div class="mb-2">
                        <h4 class="flex items-center text-[15px] font-black text-amber-700 mb-2">
                            <i data-lucide="book-open" class="w-4 h-4 mr-1.5"></i> 歷史與故事
                        </h4>
                        <div class="bg-gradient-to-br from-amber-50/80 to-amber-50/30 p-4 rounded-2xl border border-amber-100/70">
                            <p class="text-gray-700 text-[14px] leading-relaxed whitespace-pre-line">${event.story}</p>
                        </div>
                    </div>
                `;
            }

            document.getElementById('modal-content').innerHTML = contentHtml;
            lucide.createIcons();

            const modal = document.getElementById('info-modal');
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.add('show');
            }, 10);
        }

        function closeModal(event) {
            const modal = document.getElementById('info-modal');
            modal.classList.remove('show');
            setTimeout(() => {
                // Wait for transition
            }, 300);
        }

        // --- 智慧日期選擇邏輯 ---
        function detectCurrentDay() {
            const today = new Date();
            const y = today.getFullYear();
            const m = String(today.getMonth() + 1).padStart(2, '0');
            const d = String(today.getDate()).padStart(2, '0');
            const todayStr = `${y}-${m}-${d}`;

            const match = itineraryData.find(day => day.dateStr === todayStr);
            if (match) {
                currentActiveDayId = match.id;
            } else {
                currentActiveDayId = 0; // 預設第一天
            }
        }

        // --- 渲染函式 ---
        function initApp() {
            detectCurrentDay();
            renderTabs();
            renderContent(currentActiveDayId);
        }

        function renderTabs() {
            const tabsContainer = document.getElementById('day-tabs');
            tabsContainer.innerHTML = '';

            itineraryData.forEach(dayInfo => {
                const btn = document.createElement('button');
                const isActive = dayInfo.id === currentActiveDayId;

                btn.className = `flex-shrink-0 px-4 py-2 rounded-full text-[15px] font-bold transition-all duration-300 snap-center outline-none ${isActive
                    ? 'bg-blue-600 text-white shadow-md transform scale-105'
                    : 'bg-white text-gray-500 border border-gray-200 hover:bg-gray-100'
                    }`;
                btn.innerText = dayInfo.day;
                btn.onclick = () => {
                    currentActiveDayId = dayInfo.id;
                    renderTabs();
                    renderContent(dayInfo.id);
                    // 使用 scrollTo 精確控制 tab 容器滾動，避免 scrollIntoView 連帶捲動 body
                    const container = document.getElementById('day-tabs');
                    const scrollLeft = btn.offsetLeft - container.offsetWidth / 2 + btn.offsetWidth / 2;
                    container.scrollTo({ left: scrollLeft, behavior: 'smooth' });
                };
                tabsContainer.appendChild(btn);
            });

            setTimeout(() => {
                const activeBtn = tabsContainer.children[currentActiveDayId];
                if (activeBtn) {
                    // 使用 scrollTo 精確控制 tab 容器滾動，避免 scrollIntoView 連帶捲動 body
                    const scrollLeft = activeBtn.offsetLeft - tabsContainer.offsetWidth / 2 + activeBtn.offsetWidth / 2;
                    tabsContainer.scrollTo({ left: scrollLeft, behavior: 'smooth' });
                }
            }, 100);
        }

        function renderContent(dayId) {
            const contentArea = document.getElementById('content-area');
            const dayData = itineraryData.find(d => d.id === dayId);

            if (!dayData) return;

            let html = `
                <div class="mb-6 flex items-center justify-between">
                    <div>
                        <h2 class="text-2xl font-black text-gray-800">${dayData.day}</h2>
                        <p class="text-[15px] font-bold text-blue-600 mt-1 tracking-wide">${dayData.date} · ${dayData.location}</p>
                    </div>
                </div>
                <div class="relative timeline-line">
            `;

            dayData.events.forEach((event, index) => {
                const iconName = getTransportIcon(event.tr);
                const isLast = index === dayData.events.length - 1;
                const mapLink = event.navigation || '';
                const showMapBtn = !!mapLink;
                const hasInfo = event.n || event.intro || event.story;

                const infoBtnHtml = hasInfo ? `
                    <button onclick="openModal(${dayData.id}, ${index})" class="flex items-center gap-1 bg-gray-100 text-gray-600 px-3 py-1.5 rounded-full text-xs font-bold hover:bg-gray-200 transition-colors shadow-sm active:scale-95 ml-2">
                        <i data-lucide="info" class="w-3.5 h-3.5"></i> 詳情
                    </button>
                ` : '';

                html += `
                <div class="timeline-item relative pl-10 mb-5 ${isLast ? '' : ''}">
                    <div class="absolute left-[-1px] top-1.5 w-8 h-8 rounded-full bg-white border-2 border-blue-500 flex items-center justify-center shadow-sm z-10">
                        <i data-lucide="${iconName}" class="w-4 h-4 text-blue-600"></i>
                    </div>

                    <div class="bg-white p-4 py-4 rounded-2xl shadow-sm border border-gray-100">
                        <div class="flex justify-between items-start mb-2">
                            <span class="inline-block px-2.5 py-1 bg-gray-100 text-gray-700 rounded-md text-[13px] font-bold tracking-wide">${event.t}</span>
                            
                            <div class="flex items-center">
                                ${showMapBtn ? `
                                <a href="${mapLink}" target="_blank" class="flex items-center gap-1 bg-blue-50 text-blue-600 px-3 py-1.5 rounded-full text-xs font-bold hover:bg-blue-100 transition-colors shadow-sm active:scale-95">
                                    <i data-lucide="map-pin" class="w-3.5 h-3.5"></i> 導航
                                </a>
                                ` : ''}
                                ${infoBtnHtml}
                            </div>
                        </div>
                        
                        <h3 class="text-[17px] font-bold text-gray-800 leading-snug mt-3 mb-2">${event.ti}</h3>
                        
                        <div class="flex flex-wrap gap-2 mt-2">
                            ${event.c ? `<span class="flex items-center gap-1 text-xs font-bold text-emerald-700 bg-emerald-50 px-2 py-1 rounded-md border border-emerald-100"><i data-lucide="circle-dollar-sign" class="w-3 h-3"></i> ${event.c}</span>` : ''}
                            ${event.o ? `<span class="flex items-center gap-1 text-xs font-bold text-orange-700 bg-orange-50 px-2 py-1 rounded-md border border-orange-100"><i data-lucide="clock" class="w-3 h-3"></i> ${event.o}</span>` : ''}
                        </div>
                    </div>
                </div>
                `;
            });

            html += `</div>`;

            contentArea.innerHTML = html;

            lucide.createIcons();
            document.querySelector('main').scrollTo({ top: 0, behavior: 'smooth' });
        }

        // --- 註冊 Service Worker (離線快取) ---
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js');
        }

        // --- 當頁面載入完成後啟動 ---
        document.addEventListener('DOMContentLoaded', () => {
            loadApp();
        });
    </script>
</body>

</html>
